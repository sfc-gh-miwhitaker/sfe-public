# =============================================================================
# SFE pre-commit standard configuration
#
# Copy this file to .pre-commit-config.yaml in any repository, then generate
# the secrets baseline:
#
#   cp shared/pre-commit-config-template.yaml .pre-commit-config.yaml
#   detect-secrets scan > .secrets.baseline
#   git add .pre-commit-config.yaml .secrets.baseline
#   git commit -m "chore: add SFE pre-commit standard"
#
# One-time machine setup (if not already done):
#   bash <(curl -sL https://raw.githubusercontent.com/sfc-gh-miwhitaker/sfe-public/main/shared/setup-dev.sh)
#
# Manual run:  pre-commit run --all-files
# =============================================================================

repos:
  # -- Secret detection (two independent scanners for defense-in-depth) -------

  # detect-secrets: keyword and pattern-based scanner with a false-positive baseline
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: package-lock\.json|\.secrets\.baseline$

  # gitleaks: second scanner; catches patterns detect-secrets misses
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # -- Standard hygiene -------------------------------------------------------

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$          # markdown uses trailing spaces for line breaks
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=5000"]  # block files > 5 MB
      - id: check-merge-conflict
      - id: detect-private-key  # blocks PEM/key file content
      - id: check-case-conflict
      - id: check-symlinks

  # -- Policy checks (Snowflake / SFE specific) --------------------------------

  - repo: local
    hooks:
      # Block .env files — use .env.example templates instead
      - id: block-env-files
        name: Block .env files (secrets)
        entry: >-
          bash -c 'if git diff --cached --name-only | grep -E "^\.env$|\.env\.(local|development|production|test)$|\.env\.server\.local$"; then echo "BLOCKED: .env files must never be committed"; exit 1; fi'
        language: system
        pass_filenames: false

      # Block private key files by extension
      - id: block-private-keys
        name: Block private key files
        entry: >-
          bash -c 'if git diff --cached --name-only | grep -iE "\.(pem|key|p8|p12|pfx)$"; then echo "BLOCKED: Private key files must never be committed"; exit 1; fi'
        language: system
        pass_filenames: false

      # Block IDE state files that contain local paths
      - id: block-cursor-state
        name: Block .cursor/ state files
        entry: >-
          bash -c 'if git diff --cached --name-only | grep -q "^\.cursor/"; then echo "BLOCKED: .cursor/ files must not be committed"; exit 1; fi'
        language: system
        pass_filenames: false

      # Block builddemo state files that embed local usernames and paths
      - id: block-builddemo-state
        name: Block .builddemo-state.json (contains local paths)
        entry: >-
          bash -c 'if git diff --cached --diff-filter=ACMR --name-only | grep -q "builddemo-state\.json"; then echo "BLOCKED: .builddemo-state.json contains local paths and usernames"; exit 1; fi'
        language: system
        pass_filenames: false

      # Scan staged diffs for hardcoded password assignments
      # Exclusions: placeholders, env var references, obvious fakes
      - id: scan-hardcoded-passwords
        name: Scan for hardcoded password assignments
        entry: >-
          bash -c 'if git diff --cached -U0 | grep -iE "^\+.*(password|passwd|pwd)\s*=\s*\S{8,}" | grep -viE "placeholder|example|<YOUR_|getenv|os\.environ|CHANGE_ME|YOUR_PASSWORD_HERE"; then echo "WARNING: Possible hardcoded password detected"; exit 1; fi'
        language: system
        pass_filenames: false

      # Block real Snowflake account identifiers (format: orgname-accountname.snowflakecomputing.com)
      - id: scan-snowflake-accounts
        name: Scan for Snowflake account identifiers
        entry: >-
          bash -c 'if git diff --cached -U0 | grep -E "^\+" | grep -iE "[a-z]{2,8}-[a-z0-9]{5,10}\.snowflakecomputing\.com" | grep -viE "example|placeholder|your.org|account_identifier|\$\{|<YOUR_|xy12345"; then echo "WARNING: Possible real Snowflake account identifier detected"; exit 1; fi'
        language: system
        pass_filenames: false
