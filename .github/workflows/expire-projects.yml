name: Auto-Archive Expired Projects

on:
  schedule:
    - cron: '15 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  expire:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find and archive expired projects
        id: expire
        run: python3 .github/scripts/expire-projects.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            ARCHIVED="${{ steps.expire.outputs.archived }}"
            git commit -m "chore: auto-archive expired projects

          Archived: ${ARCHIVED:-see diff}"
            git push
          fi
