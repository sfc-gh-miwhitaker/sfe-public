name: Demo Expiration Check

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check-expiration:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Check if demo expired
        id: check
        run: |
          EXPIRE_DATE="2026-04-01"
          TODAY=$(date +%Y-%m-%d)
          if [[ "$TODAY" > "$EXPIRE_DATE" ]]; then
            echo "expired=true" >> $GITHUB_OUTPUT
            echo "expire_date=$EXPIRE_DATE" >> $GITHUB_OUTPUT
          else
            echo "expired=false" >> $GITHUB_OUTPUT
          fi
      - name: Inject warning banners
        if: steps.check.outputs.expired == 'true'
        run: |
          EXPIRE_DATE="${{ steps.check.outputs.expire_date }}"
          CHANGED=false
          if ! grep -q '\[!WARNING\]' README.md; then
            printf '> [!WARNING]\n> **This demo expired on %s.** Snowflake features evolve rapidly — syntax and best practices may be outdated.\n> To keep using this project, remove this banner and update the expiration date, or delete this workflow.\n\n' "$EXPIRE_DATE" | cat - README.md > README.tmp
            mv README.tmp README.md
            CHANGED=true
          fi
          if ! grep -q 'WARNING: THIS DEMO EXPIRED' deploy_all.sql; then
            printf '/******************************************************************************\n * WARNING: THIS DEMO EXPIRED ON %s\n *\n * Snowflake features evolve rapidly. Code may use outdated syntax or\n * deprecated features.\n *\n * To continue: remove this banner and update the expiration date in\n * the DEMO METADATA block below.\n ******************************************************************************/\n\n' "$EXPIRE_DATE" | cat - deploy_all.sql > deploy_all.tmp
            mv deploy_all.tmp deploy_all.sql
            CHANGED=true
          fi
          if [ "$CHANGED" = true ]; then
            git config user.name "Demo Expiration Bot"
            git config user.email "se-community@snowflake.example"
            git add README.md deploy_all.sql
            git commit -m "chore: add expiration warning banners"
            git push
          fi
